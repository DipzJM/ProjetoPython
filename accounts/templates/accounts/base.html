<!-- templates/portfolio/base.html -->

<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {% load static %}

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="{% static 'portfolio/styles.css' %}">
    <title>Accounts</title>
</head>
<body>
    <header class="site-header">
        <div class="site-header-inner">
            <a href="{% url 'accounts:registo' %}" class="brand">
                <span class="brand-mark">A</span>
                <span class="brand-name">Accounts</span>
            </a>

            <button class="nav-toggle" aria-label="Abrir menu" aria-expanded="false">
                <span></span><span></span><span></span>
            </button>

            <nav class="site-nav">
                <a href="{% url 'accounts:registo' %}">Registo</a>
                <a href="{% url 'accounts:login' %}">Login</a>
            </nav>
        </div>
    </header>


    <main>
        {% block content %}
        <!-- Conteúdo dinâmico -->
        {% endblock %}
    </main>

    <footer class="site-footer">
        <div class="site-footer-inner">
            <span class="footer-brand">Portfolio</span>
            <span class="footer-divider">·</span>
            <span class="footer-meta">&copy; 2026 — Construído com Django</span>
        </div>
    </footer>

    <script src="https://kit.fontawesome.com/d68abb87c8.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
